<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Note Simplifier</title>
  <style>
    /* ── Page base ── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f4f8;
      color: #333;
      padding: 40px 16px;
    }

    /* ── Card container ── */
    .card {
      background: #ffffff;
      max-width: 760px;
      margin: 0 auto;
      border-radius: 12px;
      padding: 40px 36px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    /* ── Header ── */
    h1 {
      font-size: 2rem;
      color: #2c3e50;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    /* ── Labels and inputs ── */
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #2c3e50;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 14px;
      font-size: 0.95rem;
      border: 2px solid #d0d7de;
      border-radius: 8px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea:focus {
      border-color: #3498db;
    }

    /* ── Button ── */
    button {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #2980b9;
    }

    /* ── Error message ── */
    .error {
      background-color: #fdecea;
      color: #c0392b;
      border: 1px solid #e74c3c;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 20px;
      font-size: 0.9rem;
    }

    /* ── Output section ── */
    .output {
      margin-top: 28px;
      background-color: #eaf4fb;
      border: 1px solid #aed6f1;
      border-radius: 8px;
      padding: 20px;
    }

    .output h2 {
      font-size: 1.1rem;
      color: #1a5276;
      margin-bottom: 12px;
    }

    .output p {
      font-size: 0.97rem;
      line-height: 1.7;
      color: #2c3e50;
      white-space: pre-wrap;  /* preserves line breaks from the AI */
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>AI Note Simplifier</h1>
    <p class="subtitle">Paste your university notes below and get a simpler, easier version instantly.</p>

    <!-- Form submits to the same page (POST /) -->
    <form method="POST" action="/">
      <label for="notes">Your Notes:</label>
      <textarea
        id="notes"
        name="notes"
        placeholder="Paste your lecture notes or paragraphs here..."
      >{{ original }}</textarea>

      <button type="submit">Simplify Notes</button>
    </form>

    <!-- Show error message if input was empty or API failed -->
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <!-- Show simplified output only after a successful response -->
    {% if simplified %}
      <div class="output">
        <h2>Simplified Version:</h2>
        <p>{{ simplified }}</p>
      </div>
    {% endif %}
  </div>

  <div class="footer">AI Note Simplifier &mdash; Built with Flask &amp; OpenAI</div>

</body>
</html>
